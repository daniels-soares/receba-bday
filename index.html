<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>🎉 Feliz Aniversário!</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    min-height:100vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    font-family:'Segoe UI',sans-serif;
    background:linear-gradient(135deg,#9f63ff,#ff9ed6,#ffffff);
    background-size:400% 400%;
    animation:bgMove 10s ease infinite alternate;
    overflow:hidden;
    padding:20px;
    text-align:center;
}

@keyframes bgMove{
    0%{background-position:0% 50%;}
    100%{background-position:100% 50%;}
}

/* =========================
   CARROSSEL LATERAL
========================= */

.side-carousel {
    position: fixed;
    top: 0;
    width: 140px;
    height: 100vh;
    overflow: hidden;
    z-index: 1;
    pointer-events: none;
}

.side-carousel.left {
    left: 0;
}

.side-carousel.right {
    right: 0;
}

.track {
    display: flex;
    flex-direction: column;
    gap: 14px;
}

.track img {
    width: 100%;
    border-radius: 14px;
    object-fit: cover;
    box-shadow: 0 10px 20px rgba(0,0,0,.2);
}

.up {
    animation: scrollUp 21s linear infinite;
}

.down {
    animation: scrollDown 25s linear infinite;
}

@keyframes scrollUp {
    from { transform: translateY(0); }
    to { transform: translateY(-50%); }
}

@keyframes scrollDown {
    from { transform: translateY(-50%); }
    to { transform: translateY(0); }
}

@media (max-width: 900px) {
    .side-carousel {
        display: none;
    }
}

h1{
    color:white;
    text-shadow:2px 2px 8px rgba(0,0,0,.25);
    font-size:clamp(1.6rem,4vw,3rem);
    margin-bottom:25px;
}

#cake-container{
    position:relative;
    width:min(90vw,420px);
}

#cake-img{
    width:100%;
    display:block;
    user-select:none;
    pointer-events:none;
}

/* CHAMA */
.flame{
    position:absolute;
    width:13%;
    aspect-ratio:1/1.2;
    left:43%;
    top:12%;
    background:radial-gradient(circle,#fff 0%,#ffd54a 45%,orange 100%);
    border-radius:50% 50% 60% 60%;
    box-shadow:0 0 15px orange, 0 0 35px gold;
    animation:flicker .15s infinite;
}

@keyframes flicker{
    0%{transform:scale(1) rotate(-2deg);}
    50%{transform:scale(1.15) rotate(2deg);}
    100%{transform:scale(.92) rotate(-1deg);}
}

.hidden{ display:none; }

button{
    margin-top:35px;
    width:min(320px,90vw);
    padding:16px;
    font-size:18px;
    border:none;
    border-radius:50px;
    cursor:pointer;
    color:white;
    font-weight:bold;
    background:linear-gradient(45deg,#ff6bb5,#8b5cff);
    box-shadow:0 12px 25px rgba(0,0,0,.25);
    transition:.25s;
}

button:hover{
    transform:translateY(-3px) scale(1.05);
    box-shadow:0 18px 30px rgba(0,0,0,.3);
}

.confetti{
    position:fixed;
    top:-30px;
    opacity:.95;
    animation:fall linear forwards;
}

@keyframes fall{
    0%{transform:translateY(-30px) rotate(0deg);}
    100%{transform:translateY(110vh) rotate(720deg);}
}

</style>
</head>

<body>

<!-- CARROSSEL ESQUERDA -->
<div class="side-carousel left">
    <div class="track up">

        <img src="src/Receba/receba1.jpeg">
        <img src="src/Receba/receba2.jpeg">
        <img src="src/Receba/receba3.jpeg">
        <img src="src/Receba/receba4.jpeg">
        <img src="src/Receba/receba5.jpeg">
        <img src="src/Receba/receba6.jpeg">
        <img src="src/Receba/receba7.jpeg">
        <img src="src/Receba/receba8.jpeg">
        <img src="src/Receba/receba9.jpeg">
        <img src="src/Receba/receba10.jpeg">

        <!-- repetição -->
        <img src="src/Receba/receba1.jpeg">
        <img src="src/Receba/receba2.jpeg">
        <img src="src/Receba/receba3.jpeg">
        <img src="src/Receba/receba4.jpeg">
        <img src="src/Receba/receba5.jpeg">

    </div>
</div>

<!-- CARROSSEL DIREITA -->
<div class="side-carousel right">
    <div class="track down">

        <img src="src/Receba/receba11.jpeg">
        <img src="src/Receba/receba12.jpeg">
        <img src="src/Receba/receba13.jpeg">
        <img src="src/Receba/receba14.jpeg">
        <img src="src/Receba/receba15.jpeg">
        <img src="src/Receba/receba16.jpeg">
        <img src="src/Receba/receba17.jpeg">
        <img src="src/Receba/receba18.jpeg">
        <img src="src/Receba/receba19.jpeg">
        <img src="src/Receba/receba20.jpeg">

        <!-- repetição -->
        <img src="src/Receba/receba11.jpeg">
        <img src="src/Receba/receba12.jpeg">
        <img src="src/Receba/receba13.jpeg">
        <img src="src/Receba/receba14.jpeg">

    </div>
</div>

<h1>🎉 Parabéns, gatinha! Assopre a velinha 🎂</h1>

<div id="cake-container">
    <img src="src/cake_niver.png" id="cake-img">
    <div class="flame" id="flame"></div>
</div>

<button onclick="startMic()">🎤 Ativar Microfone</button>

<audio id="birthday-audio" src="src/Parabens.mp3" loop></audio>

<script>

let analyser;
let dataArray;
let apagou=false;

async function startMic(){

    const audio=document.getElementById("birthday-audio");
    audio.play().catch(()=>{});

    const stream=await navigator.mediaDevices.getUserMedia({audio:true});

    const audioContext=new AudioContext();
    const source=audioContext.createMediaStreamSource(stream);

    analyser=audioContext.createAnalyser();
    analyser.fftSize=256;

    source.connect(analyser);

    dataArray=new Uint8Array(analyser.frequencyBinCount);

    detectBlow();
}

function detectBlow(){

    analyser.getByteFrequencyData(dataArray);

    const volume=dataArray.reduce((a,b)=>a+b)/dataArray.length;

    if(volume>100 && !apagou){
        apagou=true;
        apagarVela();
        return;
    }

    requestAnimationFrame(detectBlow);
}

function apagarVela(){
    document.getElementById("flame").classList.add("hidden");
    soltarConfete();
}

function soltarConfete(){

    const centro=window.innerWidth/2;

    for(let i=0;i<350;i++){

        const c=document.createElement("div");
        c.className="confetti";

        c.style.left=(centro+(Math.random()-0.5)*260)+"px";
        c.style.width=(6+Math.random()*10)+"px";
        c.style.height=(10+Math.random()*18)+"px";
        c.style.background=`hsl(${Math.random()*360},100%,60%)`;
        c.style.animationDuration=(3+Math.random()*3)+"s";

        document.body.appendChild(c);

        setTimeout(()=>c.remove(),7000);
    }
}

</script>

</body>
</html>
